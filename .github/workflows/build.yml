name: Build

# Builds the Windows .exe and macOS .dmg in the cloud (no local machine needed).
# - Push to main: builds both and uploads them as downloadable artifacts.
# - Tag vX.Y.Z: a single release job publishes ONE GitHub Release with both files.

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install
      - run: npm run dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: dist/*.exe
          if-no-files-found: error

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install
      - run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: dist/*.dmg
          if-no-files-found: error

  # One release, created after BOTH builds finish (avoids the create-release race).
  release:
    needs: [windows, macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/win-installer/*.exe
            artifacts/mac-installer/*.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true
