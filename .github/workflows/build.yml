name: Build

# Builds the Windows installer (.exe) in the cloud — no Windows PC needed.
# - Every push to main: builds and uploads the .exe as a downloadable artifact.
# - Every tag like v1.0.0: also publishes a GitHub Release with the .exe attached.

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write   # needed to create Releases

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"   # unsigned build (no code-sign cert)

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperStudio-Windows-Setup
          path: dist/*.exe
          if-no-files-found: error

      - name: Publish Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build macOS app (universal .dmg)
        run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"   # unsigned build (no Apple cert)

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperStudio-macOS
          path: dist/*.dmg
          if-no-files-found: error

      - name: Publish Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
